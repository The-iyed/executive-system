# Enforces Docker Compose build and startup on every push/PR.
# This is the server-side enforcement: pushes with --no-verify will still fail here.
name: Docker build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Compose up --build
        run: |
          docker compose up -d --build
          sleep 10
          if [ -z "$(docker compose ps --status running -q)" ]; then
            docker compose logs
            exit 1
          fi
          docker compose down
