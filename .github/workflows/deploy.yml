name: Deploy to Azure VM

on:
  push:
    branches:
      - '*.dev'
      - dev
    tags:
      - '*.dev'
      
jobs:
  deploy:
    runs-on: [self-hosted, azure-runner]
    outputs:
      deploy_log: ${{ steps.deploy_step.outputs.deploy_log }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy and validate
        id: deploy_step
        env:
          VM_PASSWORD: ${{ secrets.VM_PASSWORD }}
        run: |
          # Capture all output to both console and a log variable
          LOG_FILE=$(mktemp)

          run_logged() {
            eval "$@" 2>&1 | tee -a "$LOG_FILE"
          }

          # 1. Ensure target directory exists and copy the project files to it
          echo ">>> [1/6] Creating target directory and copying files..." | tee -a "$LOG_FILE"
          echo "$VM_PASSWORD" | sudo -S mkdir -p /var/www/minister-mind-fe 2>&1 | tee -a "$LOG_FILE"

          echo "$VM_PASSWORD" | sudo -S cp -R . /var/www/minister-mind-fe 2>&1 | tee -a "$LOG_FILE"
          
          # 2. Navigate to the project directory
          cd /var/www/minister-mind-fe

          # 3. Pull the latest base images and rebuild the containers securely
          echo ">>> [3/6] Pulling latest images..." | tee -a "$LOG_FILE"
          echo "$VM_PASSWORD" | sudo -S docker compose pull 2>&1 | tee -a "$LOG_FILE"
          echo ">>> [3/6] Rebuilding and restarting containers..." | tee -a "$LOG_FILE"
          echo "$VM_PASSWORD" | sudo -S docker compose up -d --build --force-recreate 2>&1 | tee -a "$LOG_FILE"
          
          # 4. Wait a few seconds for containers to initialize
          echo ">>> [4/6] Waiting for services to start..." | tee -a "$LOG_FILE"
          sleep 10
          
          # 5. Verify the service is healthy (Port 4404 is the frontend)
          echo ">>> [5/6] Running health check..." | tee -a "$LOG_FILE"
          if echo "$VM_PASSWORD" | sudo -S curl -f http://localhost:4404 > /dev/null 2>&1; then
            echo "✅ Deployment successful: Service is healthy!" | tee -a "$LOG_FILE"
          else
            echo "⚠️ Deployment warning: Health check failed or endpoint not ready yet." | tee -a "$LOG_FILE"
          fi
          
          # 6. Clean up dangling images
          echo ">>> [6/6] Cleaning up dangling images..." | tee -a "$LOG_FILE"
          echo "$VM_PASSWORD" | sudo -S docker image prune -af --filter "until=24h" 2>&1 | tee -a "$LOG_FILE"

          # Save the log as a step output (truncated to last 1800 chars to stay within limits)
          FULL_LOG=$(cat "$LOG_FILE")
          TRUNCATED_LOG=$(echo "$FULL_LOG" | tail -c 1800)
          # Escape newlines for GitHub Actions output
          echo "deploy_log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TRUNCATED_LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          rm -f "$LOG_FILE"
  # notify:
  #   needs: deploy
  #   runs-on: ubuntu-latest
  #   if: always()
  #   steps:
  #     - uses: lacherogwu/failed-jobs-discord-notification-action@v1
  #       with:
  #         discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
  #         needs_json: ${{ toJSON(needs) }}
  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Discord Notification with Logs
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DEPLOY_LOG: ${{ needs.deploy.outputs.deploy_log }}
          DEPLOY_STATUS: ${{ needs.deploy.result }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          WORKFLOW: ${{ github.workflow }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request

          status     = os.environ["DEPLOY_STATUS"]
          branch     = os.environ["BRANCH"]
          log        = os.environ.get("DEPLOY_LOG", "").strip()
          repo       = os.environ["REPO"]
          run_id     = os.environ["RUN_ID"]
          run_url    = f"https://github.com/{repo}/actions/runs/{run_id}"
          workflow   = os.environ["WORKFLOW"]
          webhook    = os.environ["DISCORD_WEBHOOK"]
          commit_msg = os.environ.get("COMMIT_MSG", "N/A")
          actor      = os.environ.get("ACTOR", "N/A")

          if status == "success":
              color  = 3066993        # green
              title  = "✅ Deployment Succeeded"
              # On success, keep logs short or omit them
              fields = [
                  {"name": "Project",      "value": "Minister Mind Frontend", "inline": True},
                  {"name": "Branch / Tag", "value": branch,                   "inline": True},
                  {"name": "Triggered by", "value": actor,                    "inline": True},
                  {"name": "Commit",       "value": commit_msg[:200],         "inline": False},
                  {"name": "Run Details",  "value": f"[View run]({run_url})", "inline": False},
              ]

          elif status == "failure":
              color  = 15158332       # red
              title  = "❌ Deployment Failed"

              # Trim log to last 1800 chars to stay within Discord's 2000-char field limit
              failure_log = log[-1800:] if log else "No logs captured — check the run link below."

              fields = [
                  {"name": "Project",        "value": "Minister Mind Frontend",       "inline": True},
                  {"name": "Branch / Tag",   "value": branch,                         "inline": True},
                  {"name": "Triggered by",   "value": actor,                          "inline": True},
                  {"name": "Commit",         "value": commit_msg[:200],               "inline": False},
                  {"name": "❗ Failure Logs", "value": f"```\n{failure_log}\n```",     "inline": False},
                  {"name": "Full Run",       "value": f"[View full logs]({run_url})", "inline": False},
              ]

          else:
              color  = 10181046       # grey (cancelled / skipped)
              title  = f"⚠️ Deployment {status.capitalize()}"
              fields = [
                  {"name": "Project",      "value": "Minister Mind Frontend", "inline": True},
                  {"name": "Branch / Tag", "value": branch,                   "inline": True},
                  {"name": "Status",       "value": status,                   "inline": True},
                  {"name": "Run Details",  "value": f"[View run]({run_url})", "inline": False},
              ]

          payload = {
              "embeds": [{
                  "title":  title,
                  "color":  color,
                  "fields": fields,
                  "footer": {"text": f"GitHub Actions — {workflow}"}
              }]
          }

          data = json.dumps(payload).encode("utf-8")
          req  = urllib.request.Request(
              webhook, data=data,
              headers={"Content-Type": "application/json"}
          )
          try:
              resp = urllib.request.urlopen(req)
              print(f"Discord response: {resp.status}")
          except Exception as e:
              print(f"Discord webhook error: {e}")
          PYEOF