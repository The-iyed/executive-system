name: Deploy to Azure VM

on:
  push:
    branches:
      - '*.dev'
      - dev
    tags:
      - '*.dev'

jobs:
  deploy:
    runs-on: [self-hosted, azure-runner]
    outputs:
      deploy_log: ${{ steps.deploy_step.outputs.deploy_log }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy and validate
        id: deploy_step
        env:
          VM_PASSWORD: ${{ secrets.VM_PASSWORD }}
        run: |
          set -eo pipefail
          LOG_FILE=$(mktemp)

          save_log() {
            TRUNCATED_LOG=$(tail -c 3500 "$LOG_FILE" 2>/dev/null || true)
            printf 'deploy_log<<EOF\n%s\nEOF\n' "$TRUNCATED_LOG" >> "$GITHUB_OUTPUT"
            rm -f "$LOG_FILE"
          }
          trap save_log EXIT

          echo ">>> [1/6] Creating target directory and copying files..." | tee -a "$LOG_FILE"
          echo "$VM_PASSWORD" | sudo -S mkdir -p /var/www/minister-mind-fe 2>&1 | tee -a "$LOG_FILE"
          echo "$VM_PASSWORD" | sudo -S cp -R . /var/www/minister-mind-fe 2>&1 | tee -a "$LOG_FILE"

          cd /var/www/minister-mind-fe

          echo ">>> [2/6] Pulling latest images..." | tee -a "$LOG_FILE"
          echo "$VM_PASSWORD" | sudo -S docker compose pull 2>&1 | tee -a "$LOG_FILE"

          echo ">>> [3/6] Rebuilding and restarting containers..." | tee -a "$LOG_FILE"
          echo "$VM_PASSWORD" | sudo -S docker compose up -d --build --force-recreate 2>&1 | tee -a "$LOG_FILE"

          echo ">>> [4/6] Waiting for services to start..." | tee -a "$LOG_FILE"
          sleep 10

          echo ">>> [5/6] Running health check..." | tee -a "$LOG_FILE"
          if echo "$VM_PASSWORD" | sudo -S curl -f http://localhost:4404 > /dev/null 2>&1; then
            echo "Deployment successful: Service is healthy!" | tee -a "$LOG_FILE"
          else
            echo "HEALTH CHECK FAILED: Service on port 4404 is not responding!" | tee -a "$LOG_FILE"
            exit 1
          fi

          echo ">>> [6/6] Cleaning up dangling images..." | tee -a "$LOG_FILE"
          echo "$VM_PASSWORD" | sudo -S docker image prune -af --filter "until=24h" 2>&1 | tee -a "$LOG_FILE"

  notify:
    name: Discord Notification
    needs: deploy
    runs-on: [self-hosted, azure-runner]
    if: always()
    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          DEPLOY_LOG: ${{ toJSON(needs.deploy.outputs.deploy_log) }}
          REPO: ${{ github.repository }}
          REPO_URL: ${{ github.event.repository.html_url }}
          RUN_ID: ${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          AUTHOR: ${{ github.actor }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.error

          webhook    = os.environ["DISCORD_WEBHOOK"]
          result     = os.environ["DEPLOY_RESULT"]
          repo       = os.environ["REPO"]
          repo_url   = os.environ["REPO_URL"]
          run_id     = os.environ["RUN_ID"]
          branch     = os.environ["BRANCH"]
          commit_sha = os.environ["COMMIT_SHA"][:7]
          commit_msg = os.environ["COMMIT_MSG"]
          author     = os.environ["AUTHOR"]
          run_url    = f"https://github.com/{repo}/actions/runs/{run_id}"

          is_success = result == "success"
          color      = 2664261 if is_success else 14431557
          icon       = "✅" if is_success else "❌"
          desc       = "Deployment completed successfully." if is_success else "Deployment **FAILED**. See logs below."

          status_embed = {
              "title":       f"{icon} GitHub Action",
              "description": desc,
              "color":       color,
              "fields": [
                  {"name": "📁 Project",     "value": f"[{repo}]({repo_url})",                                                         "inline": True},
                  {"name": "🌍 Environment", "value": "production",                                                                     "inline": True},
                  {"name": "📊 Status",      "value": result,                                                                           "inline": True},
                  {"name": "👤 Author",      "value": author,                                                                           "inline": True},
                  {"name": "🌿 Branch",      "value": branch or "unknown",                                                              "inline": True},  # ← add this
                  {"name": "🔗 Commit",      "value": f"[`{commit_sha}`]({repo_url}/commit/{os.environ['COMMIT_SHA']}) — {commit_msg}", "inline": False},
                  {"name": "🚀 Run",         "value": f"[View run]({run_url})",                                                        "inline": False},
              ],
              "footer":    {"text": "Deployment Service | Powered by GitHub"},
              "thumbnail": {"url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"}
          }

          def send(payload):
              data = json.dumps(payload).encode("utf-8")
              req  = urllib.request.Request(
                  webhook, data=data,
                  headers={"Content-Type": "application/json", "User-Agent": "curl/8.5.0"},
                  method="POST"
              )
              try:
                  resp = urllib.request.urlopen(req)
                  print(f"Discord notified: {resp.status}")
              except urllib.error.HTTPError as e:
                  print(f"Discord HTTP error {e.code}: {e.read().decode()}")
              except Exception as e:
                  print(f"Discord webhook error: {e}")

          send({"embeds": [status_embed]})

          if not is_success:
              raw_log = os.environ.get("DEPLOY_LOG", "")
              try:
                  log = json.loads(raw_log)
              except Exception:
                  log = raw_log
              log = (log or "").strip()

              # Extract only ERROR/FAILED lines for a clean summary
              error_lines = []
              for line in log.splitlines():
                  line_lower = line.lower()
                  if any(kw in line_lower for kw in ["error", "failed", "exit code", "health check"]):
                      error_lines.append(line.strip())

              if error_lines:
                  summary = "\n".join(error_lines[-15:])   # last 15 error lines max
              else:
                  summary = log[-800:] if log else "No logs captured."

              log_value = f"```\n{summary}\n```"
              if len(log_value) > 1024:
                  log_value = f"```\n{summary[:980]}\n...\n```"

              log_embed = {
                  "title": "📋 Failure Logs",
                  "color": 14431557,
                  "fields": [
                      {"name": "🌿 Branch",       "value": branch or "unknown",       "inline": True},
                      {"name": "🔗 Full Run Logs","value": f"[View run]({run_url})",   "inline": True},
                      {"name": "📄 Error Summary","value": log_value,                 "inline": False},
                  ],
                  "footer": {"text": "GitHub Actions - Deploy to Azure VM"}
              }
              send({"embeds": [log_embed]})
          PYEOF