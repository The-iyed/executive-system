name: Deploy to Azure VM

on:
  push:
    branches:
      - '*.dev'
      - dev
    tags:
      - '*.dev'
      
jobs:
  deploy:
    runs-on: [self-hosted, azure-runner]
    outputs:
      deploy_log: ${{ steps.deploy_step.outputs.deploy_log }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy and validate
        id: deploy_step
        env:
          VM_PASSWORD: ${{ secrets.VM_PASSWORD }}
        run: |
          # -e  → exit immediately on any error
          # -o pipefail → a pipe fails if ANY command in it fails (not just the last)
          set -eo pipefail

          LOG_FILE=$(mktemp)

          # Save logs to GITHUB_OUTPUT even if the script exits early due to an error
          save_log() {
            TRUNCATED_LOG=$(tail -c 1800 "$LOG_FILE" 2>/dev/null || true)
            printf 'deploy_log<<EOF\n%s\nEOF\n' "$TRUNCATED_LOG" >> "$GITHUB_OUTPUT"
            rm -f "$LOG_FILE"
          }
          trap save_log EXIT

          # 1. Ensure target directory exists and copy the project files to it
          echo ">>> [1/6] Creating target directory and copying files..." | tee -a "$LOG_FILE"
          echo "$VM_PASSWORD" | sudo -S mkdir -p /var/www/minister-mind-fe 2>&1 | tee -a "$LOG_FILE"
          echo "$VM_PASSWORD" | sudo -S cp -R . /var/www/minister-mind-fe 2>&1 | tee -a "$LOG_FILE"

          # 2. Navigate to the project directory
          cd /var/www/minister-mind-fe

          # 3. Pull the latest base images and rebuild the containers
          echo ">>> [3/6] Pulling latest images..." | tee -a "$LOG_FILE"
          echo "$VM_PASSWORD" | sudo -S docker compose pull 2>&1 | tee -a "$LOG_FILE"

          echo ">>> [3/6] Rebuilding and restarting containers..." | tee -a "$LOG_FILE"
          # pipefail means this will FAIL the step if docker compose build/up fails
          echo "$VM_PASSWORD" | sudo -S docker compose up -d --build --force-recreate 2>&1 | tee -a "$LOG_FILE"

          # 4. Wait a few seconds for containers to initialize
          echo ">>> [4/6] Waiting for services to start..." | tee -a "$LOG_FILE"
          sleep 10

          # 5. Verify the service is healthy (Port 4404 is the frontend)
          echo ">>> [5/6] Running health check..." | tee -a "$LOG_FILE"
          if echo "$VM_PASSWORD" | sudo -S curl -f http://localhost:4404 > /dev/null 2>&1; then
            echo "Deployment successful: Service is healthy!" | tee -a "$LOG_FILE"
          else
            echo "HEALTH CHECK FAILED: Service on port 4404 is not responding!" | tee -a "$LOG_FILE"
            exit 1
          fi

          # 6. Clean up dangling images
          echo ">>> [6/6] Cleaning up dangling images..." | tee -a "$LOG_FILE"
          echo "$VM_PASSWORD" | sudo -S docker image prune -af --filter "until=24h" 2>&1 | tee -a "$LOG_FILE"
  notify:
    name: Discord Notification
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DEPLOY_STATUS: ${{ needs.deploy.result }}
          DEPLOY_LOG: ${{ needs.deploy.outputs.deploy_log }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request

          status     = os.environ.get("DEPLOY_STATUS", "unknown")
          log        = os.environ.get("DEPLOY_LOG", "").strip()
          branch     = os.environ.get("BRANCH", "unknown")
          repo       = os.environ.get("REPO", "")
          run_id     = os.environ.get("RUN_ID", "")
          actor      = os.environ.get("ACTOR", "unknown")
          commit_msg = os.environ.get("COMMIT_MSG", "N/A")
          commit_sha = os.environ.get("COMMIT_SHA", "")
          webhook    = os.environ.get("DISCORD_WEBHOOK", "")

          run_url    = f"https://github.com/{repo}/actions/runs/{run_id}"
          commit_url = f"https://github.com/{repo}/commit/{commit_sha}"
          short_sha  = commit_sha[:7]

          if status == "success":
              color  = 3066993   # green
              title  = "Deployment Succeeded"
              desc   = "The deployment completed successfully."
              fields = [
                  {"name": "Project",    "value": "Minister Mind Frontend",           "inline": True},
                  {"name": "Branch",     "value": branch,                             "inline": True},
                  {"name": "Author",     "value": actor,                              "inline": True},
                  {"name": "Commit",     "value": f"[{short_sha}]({commit_url}): {commit_msg[:100]}", "inline": False},
                  {"name": "Run Link",   "value": f"[View run details]({run_url})",   "inline": False},
              ]
          elif status == "failure":
              color  = 15158332  # red
              title  = "Deployment Failed"
              desc   = "The deployment encountered an error. See logs below."
              # Trim log to last 1800 chars to stay within Discord field limit
              failure_log = log[-1800:] if log else "No logs captured. Click the run link below."
              fields = [
                  {"name": "Project",    "value": "Minister Mind Frontend",           "inline": True},
                  {"name": "Branch",     "value": branch,                             "inline": True},
                  {"name": "Author",     "value": actor,                              "inline": True},
                  {"name": "Commit",     "value": f"[{short_sha}]({commit_url}): {commit_msg[:100]}", "inline": False},
                  {"name": "Error Logs", "value": f"```\n{failure_log}\n```",         "inline": False},
                  {"name": "Full Logs",  "value": f"[Click here to view full logs]({run_url})", "inline": False},
              ]
          else:
              color  = 10181046  # grey
              title  = f"Deployment {status.capitalize()}"
              desc   = f"Pipeline ended with status: {status}"
              fields = [
                  {"name": "Project", "value": "Minister Mind Frontend", "inline": True},
                  {"name": "Branch",  "value": branch,                   "inline": True},
                  {"name": "Status",  "value": status,                   "inline": True},
                  {"name": "Run Link","value": f"[View run details]({run_url})", "inline": False},
              ]

          payload = {
              "embeds": [{
                  "title":       title,
                  "description": desc,
                  "color":       color,
                  "fields":      fields,
                  "footer":      {"text": "GitHub Actions - Deploy to Azure VM"}
              }]
          }

          data = json.dumps(payload).encode("utf-8")
          req  = urllib.request.Request(
              webhook, data=data,
              headers={"Content-Type": "application/json"}
          )
          try:
              resp = urllib.request.urlopen(req)
              print(f"Discord notified successfully: HTTP {resp.status}")
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"Discord HTTP error {e.code}: {body}")
          except Exception as e:
              print(f"Discord error: {e}")
          PYEOF
