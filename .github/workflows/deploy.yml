name: Deploy to Azure VM

on:
  push:
    branches:
      - '*.dev'
      - dev
    tags:
      - '*.dev'
      
jobs:
  deploy:
    runs-on: [self-hosted, azure-runner]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy and validate
        env:
          VM_PASSWORD: ${{ secrets.VM_PASSWORD }}
        run: |
          # 1. Ensure target directory exists and copy the project files to it
          echo "$VM_PASSWORD" | sudo -S mkdir -p /var/www/minister-mind-fe 
          pwd
          echo "$VM_PASSWORD" | sudo -S cp -R . /var/www/minister-mind-fe
          
          # 2. Navigate to the project directory
          cd /var/www/minister-mind-fe
          
          # 3. Pull the latest base images and rebuild the containers securely
          echo "$VM_PASSWORD" | sudo -S docker compose pull
          echo "$VM_PASSWORD" | sudo -S docker compose up -d --build
          
          # 4. Best Practice: Wait a few seconds for containers to initialize
          echo "Waiting for services to start..."
          sleep 10
          
          # 5. Best Practice: Verify the service is healthy (Port 4404 is the frontend)
          if curl -f http://localhost:4404 > /dev/null 2>&1; then
            echo "Deployment successful: Service is healthy!"
          else
            echo "Deployment warning: Health check failed or endpoint not ready yet."
          fi
          
          # 6. Best Practice: Clean up dangling images to prevent filling the VM's disk space over time
          # sudo docker image prune -af --filter "until=24h"

